<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tambah Produk - Aji iPhone</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f5f5f7;
        color: #1d1d1f;
      }
      .form-card {
        background: #ffffff;
        border-radius: 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        border: none;
        padding: 2rem;
      }
      .form-control,
      .form-select {
        border-radius: 12px;
        padding: 0.75rem 1rem;
        border: 1px solid #d2d2d7;
        background-color: #f5f5f7;
      }
      .form-control:focus,
      .form-select:focus {
        background-color: #ffffff;
        border-color: #0071e3;
        box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.2);
      }
      .form-label {
        font-weight: 500;
        font-size: 0.9rem;
        color: #1d1d1f;
      }
      .btn-apple {
        background-color: #0071e3;
        color: white;
        border-radius: 12px;
        padding: 0.8rem;
        font-weight: 600;
        font-size: 1rem;
        border: none;
        transition: 0.2s;
      }
      .btn-apple:hover {
        background-color: #0077ed;
        color: white;
      }
      .btn-apple-cancel {
        background-color: #e8e8ed;
        color: #1d1d1f;
        border-radius: 12px;
        padding: 0.8rem;
        font-weight: 600;
        font-size: 1rem;
        border: none;
        transition: 0.2s;
        text-decoration: none;
        display: block;
        text-align: center;
      }
      .btn-apple-cancel:hover {
        background-color: #d2d2d7;
        color: #1d1d1f;
      }
    </style>
  </head>
  <body>
    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 100vh"
    >
      <div class="card form-card w-100" style="max-width: 500px">
        <div class="text-center mb-4">
          <h2 class="fw-bold mb-1" style="letter-spacing: -0.03em">
            Tambah Produk
          </h2>
          <p class="text-secondary small">
            Masukkan detail produk Apple baru ke dalam inventaris.
          </p>
        </div>

        <form id="formTambah">
          <div class="mb-3">
            <label class="form-label">Tipe / Nama Produk</label>
            <input
              type="text"
              id="nama"
              class="form-control"
              placeholder="Cth: iPhone 15 Pro 256GB Titanium"
              required
            />
          </div>
          <div class="mb-3">
            <label class="form-label">Kategori</label>
            <select id="kategori" class="form-select" required>
              <option value="" disabled selected>-- Pilih Kategori --</option>
              <option value="iPhone Baru">iPhone Baru (BNIB)</option>
              <option value="iPhone Bekas">iPhone Bekas (Second)</option>
              <option value="iPad">iPad</option>
              <option value="Aksesoris">Aksesoris (Charger, Case, dll)</option>
              <option value="Sparepart">Sparepart / Servis</option>
            </select>
          </div>
          <div class="row">
            <div class="col-md-7 mb-4">
              <label class="form-label">Harga Jual (Rp)</label>
              <input
                type="number"
                id="harga"
                class="form-control"
                placeholder="0"
                required
              />
            </div>
            <div class="col-md-5 mb-4">
              <label class="form-label">Stok Fisik</label>
              <input
                type="number"
                id="stok"
                class="form-control"
                placeholder="0"
                required
              />
            </div>
          </div>

          <button type="submit" class="btn btn-apple w-100 mb-2">
            Simpan Produk
          </button>
          <a href="index.html" class="btn-apple-cancel w-100">Batal</a>
        </form>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script>
      $("#formTambah").submit(function (e) {
        e.preventDefault();
        let payload = {
          nama: $("#nama").val(),
          kategori: $("#kategori").val(),
          harga: $("#harga").val(),
          stok: $("#stok").val(),
        };
        $.ajax({
          url: "/api/products",
          type: "POST",
          contentType: "application/json",
          data: JSON.stringify(payload),
          success: function (res) {
            alert(res.message);
            window.location.href = "index.html";
          },
          error: function (err) {
            alert("Gagal menambahkan data.");
          },
        });
      });
    </script>
  </body>
</html>
